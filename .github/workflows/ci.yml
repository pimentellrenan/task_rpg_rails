name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskrpg
          POSTGRES_PASSWORD: taskrpg123
          POSTGRES_DB: task_rpg_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskrpg -d task_rpg_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://taskrpg:taskrpg123@localhost:5432/task_rpg_test
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: psql "$DATABASE_URL" -f db/ci_schema.sql
      - run: bundle exec rails test

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check Vercel secrets
        id: vercel_secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_PROJECT_ID" ] && [ -n "$VERCEL_ORG_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping Vercel deploy. Define VERCEL_TOKEN, VERCEL_PROJECT_ID, and VERCEL_ORG_ID repository secrets."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.vercel_secrets.outputs.ready == 'true'
        run: npm i -g vercel@latest
      - if: steps.vercel_secrets.outputs.ready == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - if: steps.vercel_secrets.outputs.ready == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - if: steps.vercel_secrets.outputs.ready == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
